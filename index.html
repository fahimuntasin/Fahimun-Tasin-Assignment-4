<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PH job tracker</title>

    <!-- tailwind & daisyui  -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

  <!-- font -->
   <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
</head>
<body class="bg-base-200 min-h-screen">
    <div class="max-w-6xl mx-auto p-4 md:p-8">

        <h1 class="text-2xl md:text-3xl font-bold mb-6">PH Job Tracker</h1>


    <!-- status -->
   <div class="grid grid-cols-1 sm:grid-cols-3 gap-4 mb-8">
      <div class="card bg-base-100 shadow">
        <div class="card-body p-4">
          <p class="text-sm opacity-70">Total</p>
          <h2 id="totalCount" class="text-2xl font-bold">0</h2>
        </div>
    </div>
    <div class="card bg-base-100 shadow">
        <div class="card-body p-4">
            <p class="text-sm opacity-70">Completed</p>
            <h2 id="completedCount" class="text-2xl font-bold">0</h2>
        </div>
        

    </div>
        <div class="card bg-base-100 shadow">
        <div class="card-body p-4">
            <p class="text-sm opacity-70">Rejected</p>
            <h2 id="rejectedCount" class="text-2xl font-bold">0</h2>
        </div>

    </div>
   </div>
       <div class="tabs tabs-boxed mb-6 w-full sm:w-auto">
      <button class="tab tab-active" onclick="setFilter('all')">All</button>
      <button class="tab" onclick="setFilter('interview')">Interview</button>
      <button class="tab" onclick="setFilter('rejected')">Rejected</button>
    </div>

      



</body>
</html>
