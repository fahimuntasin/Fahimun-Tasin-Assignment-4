<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PH job tracker</title>

  <!-- tailwind & daisyui  -->
  <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

  <!-- font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
</head>
<style>
  body {
    font-family: 'Geist', sans-serif;
  }
</style>

<body class="bg-base-200 min-h-screen">

  <div class="max-w-6xl mx-auto p-4 md:p-8">

    <!-- Header -->
    <h1 class="text-2xl md:text-3xl font-bold mb-6">
      Job Application Tracker
    </h1>

    <!-- Stats -->
    <div class="grid grid-cols-1 sm:grid-cols-3 gap-4 mb-8">
      <div class="card bg-base-100 shadow">
        <div class="card-body p-4">
          <p class="text-sm opacity-70">Total</p>
          <h2 id="totalCount" class="text-2xl font-bold">0</h2>
        </div>
      </div>

      <div class="card bg-base-100 shadow">
        <div class="card-body p-4">
          <p class="text-sm opacity-70">Interview</p>
          <h2 id="interviewCount" class="text-2xl font-bold text-success">0</h2>
        </div>
      </div>

      <div class="card bg-base-100 shadow">
        <div class="card-body p-4">
          <p class="text-sm opacity-70">Rejected</p>
          <h2 id="rejectedCount" class="text-2xl font-bold text-error">0</h2>
        </div>
      </div>
    </div>

    <!-- Filters -->
    <div class="tabs tabs-box mb-6 w-full sm:w-auto">
      <button class="tab tab-active" onclick="setFilter('all')">All</button>
      <button class="tab" onclick="setFilter('interview')">Interview</button>
      <button class="tab" onclick="setFilter('rejected')">Rejected</button>

    </div>

    <!-- Jobs Container -->
    <div id="jobsContainer" class="space-y-4"></div>

    <!-- Empty State -->
    <div id="emptyState" class="hidden">
      <div class="card bg-base-100 shadow mt-10">
        <div class="card-body items-center text-center p-12">
          <div class="text-5xl">
            <img src="./jobs.png" alt="">
          </div>
          <h2 class="card-title mt-4">No jobs available</h2>
          <p class="opacity-70">Check back soon for new opportunities</p>
        </div>
      </div>
    </div>

  </div>



  <script src="./ph.js"></script>
</body>

</html>
